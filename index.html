<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empire Military Downtime Tool</title>
  <meta name="description" content="Starter military downtime planner for Empire military units." />
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <p class="eyebrow">Empire Downtime</p>
    <h1>Military Downtime Tool</h1>
    <p class="subtitle">Plan military unit downtime, apply enchantments, and view expected loot, guerdon, or narrative outcomes.</p>
  </header>

  <main class="app-shell">
  <section class="panel controls-panel">
    <div class="controls-grid">
      <label class="control">
        <span>Military Activity</span>
        <select id="activitySelect"></select>
      </label>

      <label class="control">
        <span>Military Action</span>
        <select id="actionSelect"></select>
      </label>

      <label class="control">
        <span>Unit Rank</span>
        <select id="rankSelect"></select>
      </label>

      <label class="control">
        <span>Campaign Buff/Debuff</span>
        <select id="modifierSelect"></select>
      </label>

      <label class="control control--wide">
        <span>Military Enchantment / Ritual</span>
        <select id="ritualSelect"></select>
      </label>
    </div>

    <p id="ritualNote" class="note">No ritual selected.</p>
  </section>

  <aside class="planner-card result-panel">
    <div class="planner-card-header">
      <div>
        <p class="eyebrow">Planner</p>
        <h2>Military Unit</h2>
      </div>

      <button id="copySummary" type="button" class="copy-button">Copy summary</button>
    </div>

    <label class="control">
      <span>Character Name</span>
      <input id="characterName" type="text" placeholder="e.g. Yoren Clein" />
    </label>

    <label class="control">
      <span>Unit Name</span>
      <input id="unitName" type="text" placeholder="e.g. Hearthguard" />
    </label>

    <div class="modifier-breakdown" id="modifierBreakdown"></div>

    <div class="summary-box">
      <h3>Downtime result</h3>
      <div id="productionSummary" class="summary-list"></div>
    </div>
  </aside>
</main>

  <script src="script.js" defer></script>
</body>
</html>
